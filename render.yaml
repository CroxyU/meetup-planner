# Blueprint Render: Docker (API + Mini App + бот)
services:
  - type: web
    name: meetup-planner
    runtime: docker
    plan: free
    region: frankfurt
    dockerfilePath: ./Dockerfile
    dockerContext: .
    healthCheckPath: /api/health
    # Дольше ждём старт Docker + бот
    healthCheckGracePeriodSeconds: 180
    envVars:
      - key: BOT_TOKEN
        sync: false
      - key: BOT_MODE
        value: webhook
      - key: WEBAPP_URL
        value: https://meetup-planner.onrender.com
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        value: sqlite+aiosqlite:///./data/meetup.db
